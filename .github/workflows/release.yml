name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Zenvoy ${{ github.ref_name }}
          releaseBody: |
            See the assets below for the installable packages.
          releaseDraft: false
          prerelease: false

  build-server:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary: zenvoy-server
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: zenvoy-server
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: zenvoy-server
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: zenvoy-server.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build server binary
        working-directory: src-tauri
        run: cargo build --release --bin zenvoy-server --target ${{ matrix.target }}

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: zenvoy-server-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }}

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -- --check
