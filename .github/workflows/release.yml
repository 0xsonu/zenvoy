name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.release.draft == true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

  build-desktop:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name }}
          releaseName: Zenvoy ${{ github.event.release.tag_name }}
          releaseBody: ""
          releaseDraft: true
          prerelease: ${{ contains(github.event.release.tag_name, 'alpha') || contains(github.event.release.tag_name, 'beta') || contains(github.event.release.tag_name, 'rc') }}
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: true

  build-server:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary: zenvoy-server
            asset_name: zenvoy-server-aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: zenvoy-server
            asset_name: zenvoy-server-x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: zenvoy-server
            asset_name: zenvoy-server-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: zenvoy-server.exe
            asset_name: zenvoy-server-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build server binary
        working-directory: src-tauri
        run: cargo build --release --bin zenvoy-server --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload server binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          draft: true
          files: ${{ matrix.asset_name }}

  publish:
    needs: [build-desktop, build-server]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..${TAG})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          draft: false
          prerelease: ${{ contains(github.event.release.tag_name, 'alpha') || contains(github.event.release.tag_name, 'beta') || contains(github.event.release.tag_name, 'rc') }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            | Platform | Desktop App | Server Binary |
            |----------|-------------|---------------|
            | macOS (Apple Silicon) | `Zenvoy_*_aarch64.dmg` | `zenvoy-server-aarch64-apple-darwin` |
            | macOS (Intel) | `Zenvoy_*_x64.dmg` | `zenvoy-server-x86_64-apple-darwin` |
            | Linux (x64) | `Zenvoy_*_amd64.AppImage` | `zenvoy-server-x86_64-unknown-linux-gnu` |
            | Windows (x64) | `Zenvoy_*_x64-setup.exe` | `zenvoy-server-x86_64-pc-windows-msvc.exe` |
